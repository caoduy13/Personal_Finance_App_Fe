<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yeti Login — Animated Mascot</title>
  <!-- Google Font: Nunito (friendly, rounded) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ========== Page layout & soft gradient background ========== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Nunito", system-ui, sans-serif;
      background: linear-gradient(165deg, #c8e6f5 0%, #e8f4fc 45%, #ffffff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ========== Card ========== */
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(58, 94, 119, 0.12), 0 2px 12px rgba(58, 94, 119, 0.06);
      padding: 2rem 2rem 2.25rem;
    }

    .card h1 {
      margin: 0 0 0.35rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #3a5e77;
      text-align: center;
    }

    .card .subtitle {
      margin: 0 0 1.25rem;
      font-size: 0.875rem;
      color: #6b8a9e;
      text-align: center;
    }

    /* ========== Yeti SVG wrapper ========== */
    .yeti-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 0.5rem;
    }

    .yeti-svg {
      width: 200px;
      height: 200px;
      overflow: visible;
    }

    /* SVG mascot motion is driven by GSAP TweenMax (no CSS transitions on mascot parts). */

    /* ========== Form ========== */
    .field {
      margin-bottom: 1rem;
    }

    .field label,
    .password-row label:first-child {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #3a5e77;
      margin-bottom: 0.35rem;
    }

    .password-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      margin-bottom: 0.35rem;
    }

    .password-row .show-wrap {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #5a7a8f;
      cursor: pointer;
      user-select: none;
    }

    .password-row .show-wrap input {
      accent-color: #3a5e77;
      width: 1rem;
      height: 1rem;
    }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid #d0e4ef;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: #2c4555;
      background: #fafcfd;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #3a5e77;
      box-shadow: 0 0 0 3px rgba(58, 94, 119, 0.15);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(180deg, #4a7a9a 0%, #3a5e77 100%);
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(58, 94, 119, 0.35);
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .btn-login:hover {
      filter: brightness(1.06);
      box-shadow: 0 6px 20px rgba(58, 94, 119, 0.4);
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .forgot {
      display: block;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.8125rem;
    }

    .forgot a {
      color: #3a5e77;
      font-weight: 600;
      text-decoration: none;
    }

    .forgot a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="yeti-wrap">
      <!-- ========== Inline SVG Yeti (no external images) ========== -->
      <svg class="yeti-svg yeti" id="yeti" viewBox="0 0 200 220" aria-hidden="true">
        <!-- Body / face base: light blue-white tones -->
        <ellipse cx="100" cy="125" rx="78" ry="72" fill="#DDF1FA" stroke="#9ec4d8" stroke-width="2" />
        <!-- Ears -->
        <ellipse cx="38" cy="98" rx="20" ry="24" fill="#DDF1FA" stroke="#9ec4d8" stroke-width="1.5" />
        <ellipse cx="162" cy="98" rx="20" ry="24" fill="#DDF1FA" stroke="#9ec4d8" stroke-width="1.5" />

        <!-- Eyes (whites + pupils in group for tracking) -->
        <g id="eyesRoot" transform="translate(0,0)">
          <ellipse class="eye-white" cx="78" cy="118" rx="18" ry="14" fill="#fff" stroke="#b8d4e3" stroke-width="1" />
          <ellipse class="eye-white" cx="122" cy="118" rx="18" ry="14" fill="#fff" stroke="#b8d4e3" stroke-width="1" />
          <g id="pupilGroup" class="pupil-group">
            <circle class="pupil" cx="78" cy="118" r="6" fill="#3A5E77" />
            <circle class="pupil" cx="122" cy="118" r="6" fill="#3A5E77" />
          </g>
        </g>

        <!-- Snout -->
        <ellipse cx="100" cy="142" rx="28" ry="20" fill="#ecf6fb" stroke="#b8d4e3" stroke-width="1" />
        <ellipse cx="100" cy="138" rx="10" ry="8" fill="#c5dde9" opacity="0.9" />

        <!-- Mouth: path updated via JS on login hover for wider smile -->
        <path
          id="mouth"
          class="mouth"
          d="M 82 152 Q 100 162 118 152"
          fill="none"
          stroke="#3A5E77"
          stroke-width="2"
          stroke-linecap="round"
        />

        <!-- Arms: transforms animated with TweenMax (transformOrigin = shoulder) -->
        <g id="armLeft" class="arm arm-left">
          <ellipse cx="32" cy="158" rx="26" ry="34" fill="#DDF1FA" stroke="#9ec4d8" stroke-width="1.5" transform="rotate(-8 32 158)" />
        </g>
        <g id="armRight" class="arm arm-right">
          <ellipse cx="168" cy="158" rx="26" ry="34" fill="#DDF1FA" stroke="#9ec4d8" stroke-width="1.5" transform="rotate(8 168 158)" />
        </g>
      </svg>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in — our yeti respects your privacy.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <div class="password-row">
          <label for="password">Password</label>
          <label class="show-wrap">
            <input type="checkbox" id="showPassword" />
            Show Password
          </label>
        </div>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Log in</button>
    </form>

    <p class="forgot"><a href="#">Forgot password?</a></p>
  </div>

  <!-- GSAP 2 TweenMax (global TweenMax / TimelineMax / Power* eases) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
  <script>
    /**
     * Yeti Login — Darin Senneff–style interactions.
     * All SVG mascot motion uses GSAP TweenMax (no CSS transitions on SVG parts).
     *
     * --- Selectors found in this page’s inline SVG (<svg id="yeti" class="yeti-svg yeti">) ---
     * svg#yeti                    — mascot root
     * #eyesRoot                   — group around sclera + pupils
     * #eyesRoot .eye-white        — two eye-white ellipses (sclera)
     * #pupilGroup, .pupil-group   — pupil container <g>
     * #pupilGroup .pupil         — two pupil <circle> nodes
     * path#mouth.mouth            — smile <path>
     * g#armLeft.arm.arm-left      — left paw / arm <g>
     * g#armRight.arm.arm-right    — right paw / arm <g>
     * (no .eyebrow / #eyebrow* in SVG — eyebrow tween not applicable)
     */

    (function () {
      var email = document.querySelector("#email");
      var password = document.querySelector("#password");
      var showPassword = document.querySelector("#showPassword");
      var loginBtn = document.querySelector("#loginBtn");
      var loginForm = document.querySelector("#loginForm");

      var yetiSvg = document.querySelector("svg#yeti.yeti-svg");
      var eyesRoot = document.querySelector("#eyesRoot");
      var pupilGroup = document.querySelector("g#pupilGroup.pupil-group");
      var eyeWhites = document.querySelectorAll("#eyesRoot ellipse.eye-white");
      var mouth = document.querySelector("path#mouth.mouth");
      var armLeft = document.querySelector("g#armLeft.arm.arm-left");
      var armRight = document.querySelector("g#armRight.arm.arm-right");

      if (!yetiSvg || !eyesRoot || !pupilGroup || !mouth || !armLeft || !armRight || !email || !password || !showPassword || !loginBtn || !loginForm) {
        return;
      }

      var DUR = 0.45;
      var EASE = Power3.easeInOut;
      var EASE_PUPIL = Power2.easeOut;

      var MAX_PUPIL = 7;
      var currentPupilX = 0;
      var emailFocused = false;
      var passwordFocused = false;

      /** Quadratic mouth paths: interpolate for smooth smile (no MorphSVG plugin). */
      function mouthPath(t) {
        function lerp(a, b, u) {
          return a + (b - a) * u;
        }
        var x1 = lerp(82, 76, t);
        var y1 = lerp(152, 150, t);
        var cx = 100;
        var cy = lerp(162, 172, t);
        var x2 = lerp(118, 124, t);
        var y2 = lerp(152, 150, t);
        return "M " + x1 + " " + y1 + " Q " + cx + " " + cy + " " + x2 + " " + y2;
      }

      var mouthTweenProxy = { t: 0 };

      function tweenMouthSmile(wide) {
        TweenMax.killTweensOf(mouthTweenProxy);
        TweenMax.to(mouthTweenProxy, 0.38, {
          t: wide ? 1 : 0,
          ease: EASE,
          overwrite: true,
          onUpdate: function () {
            mouth.setAttribute("d", mouthPath(mouthTweenProxy.t));
            mouth.setAttribute("stroke-width", String(2 + 0.65 * mouthTweenProxy.t));
          },
        });
      }

      /**
       * Arm poses (rotation in deg, y in SVG px). transformOrigin = shoulder in SVG coords.
       */
      function tweenArms(pose) {
        TweenMax.killTweensOf([armLeft, armRight]);

        var left = { rotation: 12, y: 0, transformOrigin: "48px 138px" };
        var right = { rotation: -12, y: 0, transformOrigin: "152px 138px" };

        if (pose === "cover") {
          left = { rotation: -72, y: -8, transformOrigin: "48px 138px" };
          right = { rotation: 72, y: -8, transformOrigin: "152px 138px" };
        } else if (pose === "peek") {
          left = { rotation: 18, y: 12, transformOrigin: "48px 138px" };
          right = { rotation: -18, y: 12, transformOrigin: "152px 138px" };
        }

        TweenMax.to(armLeft, DUR, Object.assign({ ease: EASE, overwrite: "all" }, left));
        TweenMax.to(armRight, DUR, Object.assign({ ease: EASE, overwrite: "all" }, right));
      }

      function tweenEyeSquint(active) {
        TweenMax.killTweensOf(eyeWhites);
        TweenMax.staggerTo(
          Array.prototype.slice.call(eyeWhites),
          0.38,
          {
            scaleY: active ? 0.72 : 1,
            ease: EASE,
            overwrite: "all",
            cycle: {
              transformOrigin: ["78px 118px", "122px 118px"],
            },
          },
          0.04
        );
      }

      function pupilPeekScale() {
        return passwordFocused && showPassword.checked ? 0.88 : 1;
      }

      /** Sync pupil translate + peek squint scale from current password/show state. */
      function tweenPupilGroupPose() {
        TweenMax.to(pupilGroup, 0.38, {
          x: currentPupilX,
          scale: pupilPeekScale(),
          transformOrigin: "100px 118px",
          ease: EASE,
          overwrite: "all",
        });
      }

      function setPupilX(px) {
        currentPupilX = px;
        TweenMax.to(pupilGroup, 0.16, {
          x: px,
          scale: pupilPeekScale(),
          transformOrigin: "100px 118px",
          ease: EASE_PUPIL,
          overwrite: "all",
        });
      }

      function applyPasswordVisualState() {
        if (!passwordFocused) {
          tweenArms("rest");
          tweenEyeSquint(false);
        } else if (showPassword.checked) {
          tweenArms("peek");
          tweenEyeSquint(true);
        } else {
          tweenArms("cover");
          tweenEyeSquint(false);
        }
        tweenPupilGroupPose();
      }

      function updateEyeTracking(clientX) {
        if (!emailFocused) {
          setPupilX(0);
          return;
        }
        var rect = email.getBoundingClientRect();
        var w = rect.width || 1;
        var t = (clientX - rect.left) / w;
        t = Math.max(0, Math.min(1, t));
        var len = email.value.length;
        var lenBias = Math.min(1, len / 40) * 0.35;
        t = Math.max(0, Math.min(1, t * 0.65 + lenBias));
        var x = (t - 0.5) * 2 * MAX_PUPIL;
        setPupilX(x);
      }

      /* --- Initial SVG transforms (TweenMax sets GPU-friendly props on <g>) --- */
      TweenMax.set([armLeft, armRight], { force3D: true });
      TweenMax.set(armLeft, { rotation: 12, y: 0, transformOrigin: "48px 138px" });
      TweenMax.set(armRight, { rotation: -12, y: 0, transformOrigin: "152px 138px" });
      TweenMax.set(pupilGroup, { x: 0, scale: 1, transformOrigin: "100px 118px", force3D: true });
      TweenMax.set(Array.prototype.slice.call(eyeWhites), { scaleY: 1, transformOrigin: "center", force3D: true });
      mouth.setAttribute("d", mouthPath(0));
      mouth.setAttribute("stroke-width", "2");

      /* --- Email --- */
      email.addEventListener("focus", function () {
        emailFocused = true;
        updateEyeTracking(email.getBoundingClientRect().left + email.getBoundingClientRect().width / 2);
      });

      email.addEventListener("blur", function () {
        emailFocused = false;
        setPupilX(0);
      });

      email.addEventListener("input", function () {
        if (emailFocused) {
          updateEyeTracking(lastPointerX);
        }
      });

      var lastPointerX = window.innerWidth / 2;
      document.addEventListener(
        "mousemove",
        function (e) {
          lastPointerX = e.clientX;
          if (emailFocused) {
            updateEyeTracking(e.clientX);
          }
        },
        { passive: true }
      );

      /* --- Password --- */
      password.addEventListener("focus", function () {
        passwordFocused = true;
        applyPasswordVisualState();
      });

      password.addEventListener("blur", function () {
        passwordFocused = false;
        applyPasswordVisualState();
      });

      showPassword.addEventListener("change", function () {
        password.type = showPassword.checked ? "text" : "password";
        applyPasswordVisualState();
      });

      /* --- Login hover: wider smile via TweenMax --- */
      loginBtn.addEventListener("mouseenter", function () {
        tweenMouthSmile(true);
      });

      loginBtn.addEventListener("mouseleave", function () {
        tweenMouthSmile(false);
      });

      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
      });
    })();
  </script>
</body>
</html>
